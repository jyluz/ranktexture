<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tạo Rank v1.2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg: #0d0f14;
    --panel: #161a23;
    --panel2: #1c222d;
    --border: #2d3548;
    --border2: #3f4a61;
    --accent: #00f2ff;
    --accent2: #7000ff;
    --accent3: #39ff14;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --red: #ff2e63;
    --gold: #ffcc00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'JetBrains+Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Lưới nền */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
    background-size: 30px 30px;
    z-index: 0;
    pointer-events: none;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1000px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  .version {
    font-size: 10px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 3px;
    border: 1px solid var(--accent);
    padding: 2px 8px;
    display: inline-block;
    margin-bottom: 10px;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.5rem;
    font-weight: 900;
    background: linear-gradient(to right, #fff, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -1px;
  }

  .subtitle { color: var(--text2); font-size: 14px; margin-top: 5px; }

  .main-grid {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 20px;
  }

  @media (max-width: 850px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 24px;
    border-radius: 4px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }

  .panel-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .panel-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* PREVIEW */
  .preview-section {
    grid-column: 1 / -1;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--panel2);
    padding: 40px;
    border: 1px solid var(--border);
  }

  .canvas-container {
    background-image: 
      linear-gradient(45deg, #0a0a0a 25%, transparent 25%), 
      linear-gradient(-45deg, #0a0a0a 25%, transparent 25%), 
      linear-gradient(45deg, transparent 75%, #0a0a0a 75%), 
      linear-gradient(-45deg, transparent 75%, #0a0a0a 75%);
    background-size: 10px 10px;
    padding: 30px;
    border: 2px solid #000;
    margin-bottom: 20px;
  }

  /* CONTROLS */
  .input-group { margin-bottom: 20px; }
  label { display: block; font-size: 10px; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; letter-spacing: 1px; }
  
  input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border2);
    padding: 12px;
    color: #fff;
    font-family: inherit;
    outline: none;
  }

  input[type="text"]:focus { border-color: var(--accent); }

  .color-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  
  .color-input {
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--border2);
    padding: 5px 10px;
  }

  input[type="color"] {
    background: none; border: none; width: 30px; height: 30px; cursor: pointer;
  }

  .hex-val { font-size: 12px; margin-left: 10px; color: var(--text); font-family: monospace; }

  /* PRESETS */
  .presets-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 8px;
  }

  .preset-card {
    aspect-ratio: 16/9;
    cursor: pointer;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
    position: relative;
    overflow: hidden;
  }

  .preset-card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .preset-card span {
    font-size: 8px;
    font-weight: bold;
    text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    z-index: 2;
  }

  /* BUTTONS */
  .btn-main {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 12px;
    text-transform: uppercase;
    cursor: pointer;
    transition: 0.2s;
    margin-top: 10px;
  }

  .btn-main:hover { background: #fff; box-shadow: 0 0 20px rgba(0,242,255,0.4); }

  .btn-alt {
    width: 100%;
    padding: 12px;
    background: transparent;
    color: var(--accent3);
    border: 1px solid var(--accent3);
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 10px;
  }
  
  .btn-alt:hover { background: var(--accent3); color: #000; }

  /* SLIDERS */
  input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
    margin: 10px 0;
  }

  .toggle-group {
    display: flex;
    background: var(--bg);
    border: 1px solid var(--border2);
    padding: 4px;
  }

  .toggle-btn {
    flex: 1;
    padding: 8px;
    font-size: 10px;
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    text-transform: uppercase;
  }

  .toggle-btn.active { background: var(--border2); color: var(--accent); }

  .size-badge {
    font-size: 10px;
    color: var(--text3);
    margin-top: 10px;
  }

</style>
</head>
<body>

<div class="wrapper">
  <header>
    <div class="version">Update v1.2 — WYSZUBU</div>
    <h1>RANK GENERATOR</h1>
    <p class="subtitle">prefix pixel cho máy chủ</p>
  </header>

  <div class="main-grid">
    <!-- PREVIEW -->
    <div class="panel preview-section">
      <div class="panel-title">Kết quả</div>
      <div class="canvas-container">
        <canvas id="mainCanvas"></canvas>
      </div>
      <div id="miniPreviews" style="display:flex; gap: 20px; align-items: center;">
        <canvas id="zoom4x" style="image-rendering:pixelated;"></canvas>
        <canvas id="zoom8x" style="image-rendering:pixelated;"></canvas>
      </div>
      <div class="size-badge" id="resInfo">Kích thước: 0x0 px</div>
    </div>

    <!-- LEFT SIDE: TEXT & COLORS -->
    <div class="panel">
      <div class="panel-title">Văn bản và Màu sắc</div>
      
      <div class="input-group">
        <label>Nhập Chữ Rank (Cyrillic/ENG)</label>
        <input type="text" id="inpText" value="WYSZUBU" maxlength="16">
      </div>

      <div class="color-grid">
        <div class="input-group">
          <label>Màu 1</label>
          <div class="color-input">
            <input type="color" id="clr1" value="#ff0080">
            <div class="hex-val" id="hex1">#FF0080</div>
          </div>
        </div>
        <div class="input-group">
          <label>Màu 2</label>
          <div class="color-input">
            <input type="color" id="clr2" value="#7000ff">
            <div class="hex-val" id="hex2">#7000FF</div>
          </div>
        </div>
      </div>

      <div class="input-group">
        <label>Hướng gradient</label>
        <div class="toggle-group">
          <button class="toggle-btn active" onclick="setDir('H', this)">Ngang</button>
          <button class="toggle-btn" onclick="setDir('V', this)">Dọc</button>
        </div>
      </div>

      <div class="color-grid">
        <div class="input-group">
          <label>Màu chữ</label>
          <div class="color-input">
            <input type="color" id="clrT" value="#ffffff">
          </div>
        </div>
        <div class="input-group">
          <label>Màu bóng</label>
          <div class="color-input">
            <input type="color" id="clrS" value="#000000">
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT SIDE: SETTINGS & PRESETS -->
    <div class="panel">
      <div class="panel-title">Cài đặt và Mẫu</div>
      
      <div class="input-group">
        <label>Khoảng cách (X: <span id="vPadH">4</span>, Y: <span id="vPadV">2</span>)</label>
        <input type="range" id="padH" min="1" max="10" value="4">
        <input type="range" id="padV" min="0" max="6" value="2">
      </div>

      <div class="input-group">
        <label>Bóng chữ</label>
        <div class="toggle-group">
          <button class="toggle-btn active" id="shadowOn" onclick="setShadow(true, this)">Bật</button>
          <button class="toggle-btn" id="shadowOff" onclick="setShadow(false, this)">Tắt</button>
        </div>
      </div>

      <div class="input-group">
        <label>Kiểu góc</label>
        <div class="toggle-group">
          <button class="toggle-btn active" id="corRound" onclick="setCorner('round', this)">Bo tròn</button>
          <button class="toggle-btn" id="corSharp" onclick="setCorner('sharp', this)">Nhọn</button>
        </div>
      </div>

      <label>Bảng màu có sẵn</label>
      <div class="presets-grid" id="presetsArea"></div>

      <button class="btn-main" onclick="download()">TẢI XUỐNG PNG</button>
      <button class="btn-alt" onclick="downloadLarge()">TẢI XUỐNG x16 (HD)</button>
    </div>
  </div>
</div>

<script>
// --- FONT HỖ TRỢ CHỮ KIRIL (5x5/5x3 pixel) ---
const FONT = {
  // Latinh
  'A':[14,17,31,17,17],'B':[30,17,30,17,30],'C':[14,17,16,17,14],'D':[30,17,17,17,30],'E':[31,16,30,16,31],
  'F':[31,16,30,16,16],'G':[14,17,19,17,14],'H':[17,17,31,17,17],'I':[14,4,4,4,14],'J':[7,2,2,18,12],
  'K':[17,18,28,18,17],'L':[16,16,16,16,31],'M':[17,27,21,17,17],'N':[17,25,21,19,17],'O':[14,17,17,17,14],
  'P':[30,17,30,16,16],'Q':[14,17,17,18,13],'R':[30,17,30,18,17],'S':[15,16,14,1,30],'T':[31,4,4,4,4],
  'U':[17,17,17,17,14],'V':[17,17,17,10,4],'W':[17,17,21,27,17],'X':[17,10,4,10,17],'Y':[17,10,4,4,4],'Z':[31,2,4,8,31],
  // Chữ Kiril (chữ chính)
  'А':[14,17,31,17,17],'Б':[30,16,30,17,30],'В':[30,17,30,17,30],'Г':[31,16,16,16,16],'Д':[7,9,9,9,31],
  'Е':[31,16,30,16,31],'Ё':[21,0,31,16,31],'Ж':[21,21,14,21,21],'З':[30,1,14,1,30],'И':[17,19,21,25,17],
  'Й':[21,10,17,21,17],'К':[17,18,28,18,17],'Л':[7,9,9,9,9],'М':[17,27,21,17,17],'Н':[17,17,31,17,17],
  'О':[14,17,17,17,14],'П':[31,17,17,17,17],'Р':[30,17,30,16,16],'С':[14,16,16,16,14],'Т':[31,4,4,4,4],
  'У':[17,17,7,1,30],'Ф':[14,21,31,21,14],'Х':[17,10,4,10,17],'Ц':[17,17,17,31,1],'Ч':[17,17,15,1,1],
  'Ш':[17,17,17,17,31],'Щ':[17,17,17,31,1],'Ъ':[24,8,28,9,30],'Ы':[17,17,31,17,31],'Ь':[16,16,30,17,30],
  'Э':[14,1,15,1,14],'Ю':[18,18,30,18,18],'Я':[15,17,15,18,17],
  // Số và ký tự đặc biệt
  '0':[14,17,17,17,14],'1':[4,12,4,4,14],'2':[14,1,14,16,31],'3':[31,2,14,1,30],'4':[17,17,31,1,1],
  '5':[31,16,30,1,30],'6':[14,16,30,17,14],'7':[31,1,2,4,4],'8':[14,17,14,17,14],'9':[14,17,15,1,14],
  ' ':[0,0,0,0,0],'!':[4,4,4,0,4],'.':[0,0,0,0,4],':':[0,4,0,4,0]
};

const PRESETS = [
  { n: 'Ruby', c1: '#e11d48', c2: '#4c0519', t: '#ffffff' },
  { n: 'Ocean', c1: '#0ea5e9', c2: '#0c4a6e', t: '#ffffff' },
  { n: 'Toxic', c1: '#4ade80', c2: '#064e3b', t: '#ffffff' },
  { n: 'Amber', c1: '#f59e0b', c2: '#451a03', t: '#ffffff' },
  { n: 'Neon', c1: '#00f2ff', c2: '#7000ff', t: '#ffffff' },
  { n: 'Obsidian', c1: '#1e293b', c2: '#000000', t: '#cbd5e1' },
  { n: 'Candy', c1: '#f472b6', c2: '#9d174d', t: '#ffffff' },
  { n: 'Lava', c1: '#f97316', c2: '#7f1d1d', t: '#fffbeb' },
  { n: 'Forest', c1: '#22c55e', c2: '#14532d', t: '#f0fdf4' },
  { n: 'Staff', c1: '#ffffff', c2: '#94a3b8', t: '#0f172a' },
  { n: 'Ultra', c1: '#fbbf24', c2: '#d97706', t: '#000000' }
];

let state = {
  text: 'WYSZUBU',
  c1: '#ff0080',
  c2: '#7000ff',
  ct: '#ffffff',
  cs: '#000000',
  padH: 4,
  padV: 2,
  dir: 'H',
  shadow: true,
  corner: 'round'
};

function init() {
  const area = document.getElementById('presetsArea');
  PRESETS.forEach(p => {
    const d = document.createElement('div');
    d.className = 'preset-card';
    d.style.background = `linear-gradient(135deg, ${p.c1}, ${p.c2})`;
    d.innerHTML = `<span style="color:${p.t}">${p.n}</span>`;
    d.onclick = () => {
      state.c1 = p.c1; state.c2 = p.c2; state.ct = p.t;
      document.getElementById('clr1').value = p.c1;
      document.getElementById('clr2').value = p.c2;
      document.getElementById('clrT').value = p.t;
      update();
    };
    area.appendChild(d);
  });

  // Listeners
  document.getElementById('inpText').oninput = e => { state.text = e.target.value.toUpperCase(); update(); };
  document.getElementById('clr1').oninput = e => { state.c1 = e.target.value; update(); };
  document.getElementById('clr2').oninput = e => { state.c2 = e.target.value; update(); };
  document.getElementById('clrT').oninput = e => { state.ct = e.target.value; update(); };
  document.getElementById('clrS').oninput = e => { state.cs = e.target.value; update(); };
  document.getElementById('padH').oninput = e => { state.padH = parseInt(e.target.value); update(); };
  document.getElementById('padV').oninput = e => { state.padV = parseInt(e.target.value); update(); };

  update();
}

function setDir(d, btn) {
  state.dir = d;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  update();
}

function setShadow(v, btn) {
  state.shadow = v;
  btn.parentNode.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  update();
}

function setCorner(v, btn) {
  state.corner = v;
  btn.parentNode.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  update();
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
  return [r, g, b];
}

function draw() {
  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');
  
  const charH = 5;
  let textW = 0;
  for(let char of state.text) {
    const g = FONT[char] || FONT[' '];
    textW += 6; // 5 width + 1 gap
  }
  if(textW > 0) textW -= 1;

  const W = textW + state.padH * 2;
  const H = charH + state.padV * 2;

  canvas.width = W; canvas.height = H;
  const imgData = ctx.createImageData(W, H);
  const rgb1 = hexToRgb(state.c1), rgb2 = hexToRgb(state.c2);

  // Background with corners
  for(let y=0; y<H; y++) {
    for(let x=0; x<W; x++) {
      if(state.corner === 'round') {
        if((x===0 && y===0) || (x===W-1 && y===0) || (x===0 && y===H-1) || (x===W-1 && y===H-1)) continue;
      }
      
      const i = (y * W + x) * 4;
      const t = state.dir === 'H' ? x/(W-1||1) : y/(H-1||1);
      imgData.data[i] = rgb1[0] + (rgb2[0]-rgb1[0])*t;
      imgData.data[i+1] = rgb1[1] + (rgb2[1]-rgb1[1])*t;
      imgData.data[i+2] = rgb1[2] + (rgb2[2]-rgb1[2])*t;
      imgData.data[i+3] = 255;
    }
  }

  const rgbT = hexToRgb(state.ct);
  const rgbS = hexToRgb(state.cs);

  let curX = state.padH;
  for(let char of state.text) {
    const glyph = FONT[char] || FONT[' '];
    for(let row=0; row<5; row++) {
      for(let col=0; col<5; col++) {
        if((glyph[row] >> (4-col)) & 1) {
          const px = curX + col, py = state.padV + row;
          // Shadow
          if(state.shadow && px+1 < W && py+1 < H) {
            const si = ((py+1)*W + (px+1))*4;
            imgData.data[si] = rgbS[0]; imgData.data[si+1] = rgbS[1]; imgData.data[si+2] = rgbS[2]; imgData.data[si+3] = 180;
          }
        }
      }
    }
    // Main Text
    for(let row=0; row<5; row++) {
      for(let col=0; col<5; col++) {
        if((glyph[row] >> (4-col)) & 1) {
          const px = curX + col, py = state.padV + row;
          const ti = (py*W + px)*4;
          imgData.data[ti] = rgbT[0]; imgData.data[ti+1] = rgbT[1]; imgData.data[ti+2] = rgbT[2]; imgData.data[ti+3] = 255;
        }
      }
    }
    curX += 6;
  }

  ctx.putImageData(imgData, 0, 0);
  
  // UI Info
  document.getElementById('resInfo').innerText = `Kích thước: ${W}x${H} px`;
  document.getElementById('hex1').innerText = state.c1.toUpperCase();
  document.getElementById('hex2').innerText = state.c2.toUpperCase();
  document.getElementById('vPadH').innerText = state.padH;
  document.getElementById('vPadV').innerText = state.padV;

  // Zoom Previews
  scalePreview(canvas, 'zoom4x', 4);
  scalePreview(canvas, 'zoom8x', 8);
}

function scalePreview(src, targetId, scale) {
  const t = document.getElementById(targetId);
  t.width = src.width * scale; t.height = src.height * scale;
  const ctx = t.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(src, 0, 0, t.width, t.height);
}

function update() { draw(); }

function download() {
  const link = document.createElement('a');
  link.download = `rank_${state.text.toLowerCase()}.png`;
  link.href = document.getElementById('mainCanvas').toDataURL();
  link.click();
}

function downloadLarge() {
  const src = document.getElementById('mainCanvas');
  const temp = document.createElement('canvas');
  const scale = 16;
  temp.width = src.width * scale; temp.height = src.height * scale;
  const ctx = temp.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(src, 0, 0, temp.width, temp.height);
  const link = document.createElement('a');
  link.download = `rank_${state.text.toLowerCase()}_x16.png`;
  link.href = temp.toDataURL();
  link.click();
}

/* NHÌN CON CẶC CHỨ NHÌN */
window.onload = init;
</script>
</body>
</html>
